<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Candle Fun | Click Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="candles">
    <div class="light__wave"></div>

    <!-- Candle 1 (clickable) -->
    <div class="candle1" id="candle1">
      <div class="candle1__body">
        <div class="candle1__eyes">
          <span class="candle1__eyes-one"></span>
          <span class="candle1__eyes-two"></span>
        </div>
        <div class="candle1__mouth"></div>
      </div>
      <div class="candle1__stick"></div>
    </div>

    <!-- Candle 2 (clickable) -->
    <div class="candle2" id="candle2">
      <div class="candle2__body">
        <div class="candle2__eyes">
          <div class="candle2__eyes-one"></div>
          <div class="candle2__eyes-two"></div>
        </div>
      </div>
      <div class="candle2__stick"></div>
    </div>

    <div class="candle2__fire"></div>
    <div class="sparkles-one"></div>
    <div class="sparkles-two"></div>
    <div class="candle__smoke-one"></div>
    <div class="candle__smoke-two"></div>
  </div>
  <div class="floor"></div>
</div>

<script>
  // Telegram contact link
  const telegramUrl = "https://t.me/AgentSyCodeBot";

  // Make both candles clickable
  const candle1 = document.getElementById('candle1');
  const candle2 = document.getElementById('candle2');

  function redirectToTelegram() {
    window.open(telegramUrl, '_blank');
  }

  candle1.addEventListener('click', redirectToTelegram);
  candle2.addEventListener('click', redirectToTelegram);
</script>

</body>
</html>
