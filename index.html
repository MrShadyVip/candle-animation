<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Candle Fun | AgentSyCode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- New Copyright (AgentSyCode) at Top Center -->
<div class="copyright-top">
  <div class="main">
    <span>A</span>
    <span>G</span>
    <span>E</span>
    <span>N</span>
    <span>T</span>
    <span class="letter"></span>
    <span>S</span>
    <span>Y</span>
  </div>
</div>

<!-- Original candle animation -->
<div class="wrapper">
  <div class="candles">
    <div class="light__wave"></div>
    <div class="candle1">
      <div class="candle1__body">
        <div class="candle1__eyes">
          <span class="candle1__eyes-one"></span>
          <span class="candle1__eyes-two"></span>
        </div>
        <div class="candle1__mouth"></div>
      </div>
      <div class="candle1__stick"></div>
    </div>
    
    <div class="candle2">
      <div class="candle2__body">
        <div class="candle2__eyes">
          <div class="candle2__eyes-one"></div>
          <div class="candle2__eyes-two"></div>
        </div>
      </div>
      <div class="candle2__stick"></div>
    </div>
    <div class="candle2__fire"></div>
    <div class="sparkles-one"></div>
    <div class="sparkles-two"></div>
    <div class="candle__smoke-one"></div>
    <div class="candle__smoke-two"></div>
  </div>
  <div class="floor"></div>
</div>

<!-- Telegram link at bottom center -->
<div class="telegram-link">
  <a href="https://t.me/AgentSyCodeBot" target="_blank" rel="noopener noreferrer">
    Contact Telegram, click here
  </a>
</div>

</body>
</html>
